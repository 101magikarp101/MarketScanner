version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: marketscanner
      POSTGRES_USER: ms_user
      POSTGRES_PASSWORD: REDACTED_DB_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    image: marketscanner:local
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/marketscanner
      SPRING_DATASOURCE_USERNAME: ms_user
      SPRING_DATASOURCE_PASSWORD: REDACTED_DB_PASSWORD
      SPRING_PROFILES_ACTIVE: docker
      PORT: 8080
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:

