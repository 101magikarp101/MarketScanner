spring.application.name=MarketScanner
server.port=${PORT:8080}
spring.sql.init.mode=always
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/marketscanner}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ms_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:REDACTED_DB_PASSWORD}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:REDACTED_GOOGLE_CLIENT_ID.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:REDACTED_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=email
spring.jpa.hibernate.ddl-auto=update
