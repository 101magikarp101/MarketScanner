<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MarketScanner Login</title>
        <link rel="stylesheet" href="/styles.css" />

  </head>
  <body class="page-login">
    <div class="card">
      <h1>MarketScanner</h1>
      <p>Sign in to see your market overview.</p>

      <div class="error" th:if="${error}" th:text="${error}"></div>

      <form action="/login" method="post">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <button type="submit">Log in</button>
      </form>

      <div class="divider" th:if="${oauthEnabled}">or</div>
      <a class="oauth-button" th:if="${oauthEnabled}" href="/oauth2/authorization/google">Continue with Google</a>

      <div class="hint">Demo credentials: demo / demo</div>
    </div>
  </body>
</html>
